<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { 
      width: 240px; 
      padding: 15px; 
      text-align: center; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1e1e24;
      color: #fff;
      margin: 0;
    }
    h3 { margin-top: 0; color: #ff4757; margin-bottom: 5px; }
    p { font-size: 12px; color: #a4b0be; margin-top: 0; margin-bottom: 15px;}
    
    .slider-container {
      background: #2f3542;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .slider-container label {
      font-size: 12px;
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      color: #ced6e0;
    }
    /* Kaydırma Çubuğu (Slider) Tasarımı */
    input[type=range] { width: 100%; cursor: pointer; }
    
    button { 
      padding: 10px 15px; 
      cursor: pointer; 
      color: white; 
      border: none; 
      border-radius: 20px; 
      font-weight: bold; 
      width: 100%;
      transition: 0.2s;
      margin-bottom: 8px;
    }
    #baslatBtn { background: #ff4757; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4); }
    #baslatBtn:hover { background: #ff6b81; transform: scale(1.02); }
    
    #durdurBtn { background: #57606f; }
    #durdurBtn:hover { background: #747d8c; }
    
    #resetBtn { background: transparent; color: #a4b0be; text-decoration: underline; padding: 5px; font-size: 11px; margin-bottom: 0; }
    #resetBtn:hover { color: #fff; }
  </style>
</head>
<body>
  <h3>Bass Distorter</h3>
  <p>Turn your tab into a cheap car subwoofer</p>
  
  <div class="slider-container">
    <label>Distortion Level: <span id="levelText">450</span></label>
    <input type="range" id="distortionSlider" min="50" max="1500" value="450">
    <button id="resetBtn">Reset to Default</button>
  </div>

  <button id="baslatBtn">Blow the Speakers!</button>
  <button id="durdurBtn">Stop Audio / Normal</button>
  
  <script src="popup.js"></script>
</body>
</html>
